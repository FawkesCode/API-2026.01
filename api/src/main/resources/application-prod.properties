# ==================== CONFIGURAÇÃO DE PRODUÇÃO ====================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==================== MENSAGENS DE ERRO - PRODUCTION ====================
# Em produção, mensagens são genéricas e não revelam detalhes internos

app.error-messages.resource-not-found=Recurso não encontrado.
app.error-messages.access-denied=Acesso negado.
app.error-messages.unauthorized=Não autorizado.
app.error-messages.business-rule-error=Operação não permitida.
app.error-messages.internal-server-error=Erro interno. Tente novamente mais tarde.

# Auth específico
app.error-messages.register-only-director=Operação não permitida.
app.error-messages.invalid-credentials=Credenciais inválidas.
app.error-messages.expired-token=Sessão expirada. Faça login novamente.
app.error-messages.invalid-token=Não autorizado.

# Autorização
app.error-messages.insufficient-permissions=Acesso negado.
app.error-messages.role-required=Acesso negado.

# Validação
app.error-messages.invalid-input=Dados inválidos.
app.error-messages.duplicate-email=Operação não permitida.
app.error-messages.duplicate-username=Operação não permitida.
app.error-messages.department-not-found=Recurso não encontrado.
app.error-messages.group-not-found=Recurso não encontrado.
